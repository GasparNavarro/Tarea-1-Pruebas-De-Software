{% extends 'reservas/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Confirmar Cancelación</h4>
            </div>
            <div class="card-body">
                <p>¿Estás seguro que deseas cancelar la reserva de <strong>{{ object.cliente.nombre }}</strong> programada para el <strong>{{ object.fecha }}</strong> a las <strong>{{ object.bloque_horario }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Sí, Cancelar Reserva</button>
                    <a href="{% url 'lista_reservas' %}" class="btn btn-secondary">No, Volver</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
